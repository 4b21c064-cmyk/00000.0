<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小四軸 - 藍牙虛擬遙控器</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        
        .btn-fullscreen { background-color: transparent; color: #888; border: 1px solid #444; padding: 10px 18px; border-radius: 20px; font-size: 14px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-fullscreen:active { background-color: #2a2a2a; color: #fff; }
        
        .btn-connect { background-color: #00adb5; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-connect.connected { background-color: #ff2e63; }
        
        .telemetry { display: flex; justify-content: space-around; background: #181818; padding: 10px 0; font-size: 13px; border-bottom: 1px solid #222; }
        .data-box span { color: #00adb5; font-weight: bold; }
        .control-container { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 20px; position: relative; }
        
        .joystick-zone { 
            width: 120px; height: 120px; 
            background: radial-gradient(circle, #252525 0%, #1a1a1a 100%); 
            border: 2px solid #444; border-radius: 50%; position: relative; touch-action: none; 
            display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); 
        }

        .stick { 
            width: 40px; height: 40px; 
            background: linear-gradient(145deg, #333333, #222222); 
            border: 2px solid #00adb5; border-radius: 50%; position: absolute; cursor: pointer; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.4); transition: transform 0.05s linear; pointer-events: none; /* 💡 防止小球搶走大圓圈的觸控焦點 */
        }
        
        .joystick-label { position: absolute; bottom: -25px; font-size: 12px; color: #666; width: max-content; text-align: center; }

        footer { padding: 15px; background: #1e1e1e; display: flex; justify-content: center; border-top: 1px solid #333; }
        .btn-arm { width: 90%; max-width: 400px; background-color: #333; color: #888; border: 2px solid #444; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: bold; letter-spacing: 3px; cursor: pointer; text-align: center; }
        .btn-arm.ready { background-color: #ff5722; color: white; border-color: #ff5722; box-shadow: 0 0 10px rgba(255,87,34,0.5); }
        
        #orientation-warning { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #121212; z-index: 9999; justify-content: center; align-items: center; }
        @media (orientation: portrait) { #orientation-warning { display: flex; } }
    </style>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW註冊失敗：', err));
        });
      }
    </script>
</head>
<body>
    <header>
        <button id="fullscreenBtn" class="btn-fullscreen">🖥️ 全螢幕</button>
        <div class="logo">小四軸</div>
        <button id="connectBtn" class="btn-connect">連接藍牙</button>
    </header>

    <section class="telemetry">
        <div class="data-box">油門(T): <span id="valT">0</span>%</div>
        <div class="data-box">航向(Y): <span id="valY">0</span></div>
        <div class="data-box">前後(P): <span id="valP">0</span></div>
        <div class="data-box">左右(R): <span id="valR">0</span></div>
    </section>

    <main class="control-container">
        <div id="leftZone" class="joystick-zone">
            <div id="leftStick" class="stick"></div>
            <div class="joystick-label">左手：油門 / 航向</div>
        </div>
        <div id="rightZone" class="joystick-zone">
            <div id="rightStick" class="stick"></div>
            <div class="joystick-label">右手：前後 / 左右</div>
        </div>
    </main>

    <footer>
        <button id="armBtn" class="btn-arm" disabled>請先連接藍牙</button>
    </footer>

    <div id="orientation-warning">
        <div style="text-align: center; padding: 20px;">
            <span style="font-size: 50px;">🔄</span>
            <h2 style="margin-top: 15px; font-size: 18px;">請將手機旋轉至【橫螢幕模式】</h2>
            <p style="color: #888; font-size: 13px; margin-top: 5px;">為了精準盲操戰機，請解鎖手機自動旋轉並打橫使用</p>
        </div>
    </div>

    <script>
        let serialPort = null;
        let writer = null;

        let bluetoothDevice = null; let txCharacteristic = null; let isConnected = false; let isArmed = false; let transmissionIntervalId = null;
        let channels = { throttle: 1000, yaw: 1500, pitch: 1500, roll: 1500 };

        const fullscreenBtn = document.getElementById('fullscreenBtn'); 
        const connectBtn = document.getElementById('connectBtn'); const armBtn = document.getElementById('armBtn');
        const leftStick = document.getElementById('leftStick'); const rightStick = document.getElementById('rightStick');

        fullscreenBtn.addEventListener('click', async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape').catch(e => console.log('旋轉鎖定受阻:', e));
                    }
                    fullscreenBtn.textContent = "Exit 視窗";
                } else {
                    await document.exitFullscreen();
                    fullscreenBtn.textContent = "🖥️ 全螢幕";
                }
            } catch (error) { console.error(error); }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) { fullscreenBtn.textContent = "🖥️ 全螢幕"; }
        });

        connectBtn.addEventListener('click', async () => {
            if (isConnected) { disconnectBluetooth(); return; }
            try {
                console.log("正在請求電腦實體或虛擬 COM 埠權限...");
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 }); 
                writer = serialPort.writable.getWriter();
                
                isConnected = true; 
                connectBtn.textContent = "COM 埠已接通"; 
                connectBtn.classList.add('connected');
                armBtn.disabled = false; 
                armBtn.textContent = "解鎖馬達 (ARM)"; 
                armBtn.classList.add('ready');
                
                startTransmissionLoop();
            } catch (error) { 
                console.error(error);
                alert("串口連接失敗，原因: " + error.message); 
            }
        });

        function disconnectBluetooth() {
            if (transmissionIntervalId) { clearInterval(transmissionIntervalId); transmissionIntervalId = null; }
            if (writer) { writer.releaseLock(); writer = null; }
            if (serialPort) { serialPort.close(); serialPort = null; }
            
            isConnected = false; isArmed = false; connectBtn.textContent = "連接藍牙"; connectBtn.classList.remove('connected');
            armBtn.disabled = true; armBtn.classList.remove('ready'); armBtn.textContent = "請先連接藍牙";
            resetSticks();
        }

        armBtn.addEventListener('click', () => {
            if (!isConnected) return;
            isArmed = !isArmed;
            if (isArmed) { armBtn.textContent = "❗ 鎖定馬達 (DISARM)"; armBtn.style.backgroundColor = "#ff2e63"; }
            else { armBtn.textContent = "解鎖馬達 (ARM)"; armBtn.style.backgroundColor = "#ff5722"; resetSticks(); }
        });

        // 🛠️ 【完全體多點觸控重構】鎖定專屬觸控識別碼，徹底粉碎磁吸效應
        function setupJoystick(zoneId, stickId, isLeftZone) {
            const zone = document.getElementById(zoneId); 
            const stick = document.getElementById(stickId); 
            const maxRadius = 40;     
            const centerX = 40; 
            const centerY = isLeftZone ? 80 : 40; 
            
            let activeTouchId = null; // 💡 用來死死記住「是哪一根手指」按進了這個大圓圈

            stick.style.left = centerX + 'px'; 
            stick.style.top = centerY + 'px';

            function handleStart(e) {
                e.preventDefault();
                if (!isConnected) return;
                // 💡 只有當前沒有鎖定手指時，才抓取剛按下去的那根手指的識別碼 (Identifier)
                if (activeTouchId === null) {
                    const touch = e.changedTouches[0];
                    activeTouchId = touch.identifier;
                    handleMove(e);
                }
            }

            function handleMove(e) {
                e.preventDefault(); 
                if (!isConnected || activeTouchId === null) return;
                
                // 💡 遍歷當前畫面上所有的觸控點，精確找出「屬於這個搖桿」的那根手指
                let touch = null;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === activeTouchId) {
                        touch = e.touches[i];
                        break;
                    }
                }
                if (!touch) return; // 沒找到就跳出，絕對不去誤讀另一隻手！

                const rect = zone.getBoundingClientRect();
                let deltaX = touch.clientX - rect.left - 60; 
                let deltaY = touch.clientY - rect.top - 60;  
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; }
                
                if (isLeftZone) { 
                    stick.style.left = (40 + deltaX) + 'px'; 
                    stick.style.top = (40 + deltaY) + 'px'; 
                    
                    channels.yaw = Math.round(1500 + (deltaX / maxRadius) * 500);
                    channels.throttle = Math.round(1500 - (deltaY / maxRadius) * 500);
                    channels.throttle = Math.max(1000, Math.min(2000, channels.throttle));
                } else { 
                    stick.style.left = (centerX + deltaX) + 'px'; 
                    stick.style.top = (centerY + deltaY) + 'px'; 
                    
                    channels.roll = Math.round(1500 + (deltaX / maxRadius) * 500);
                    channels.pitch = Math.round(1500 - (deltaY / maxRadius) * 500); 
                }
                updateUI();
            }

            function handleEnd(e) {
                e.preventDefault();
                if (activeTouchId === null) return;
                
                // 💡 檢查離開畫面的手指，是不是綁定的這根專屬手指
                let touchTriggered = false;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === activeTouchId) {
                        touchTriggered = true;
                        break;
                    }
                }
                
                if (touchTriggered) {
                    activeTouchId = null; // 釋放手指鎖定
                    if (isLeftZone) { 
                        channels.yaw = 1500; 
                        stick.style.left = '40px';
                        // 油門死死鎖定在當前放開的高度，防止墜機！
                    } else { 
                        channels.pitch = 1500; channels.roll = 1500; 
                        stick.style.left = centerX + 'px'; stick.style.top = centerY + 'px'; 
                    }
                    updateUI();
                }
            }
            
            zone.addEventListener('touchstart', handleStart); 
            zone.addEventListener('touchmove', handleMove); 
            zone.addEventListener('touchend', handleEnd);
            zone.addEventListener('touchcancel', handleEnd);
        }

        setupJoystick('leftZone', 'leftStick', true); 
        setupJoystick('rightZone', 'rightStick', false);

        function resetSticks() {
            channels = { throttle: 1000, yaw: 1500, pitch: 1500, roll: 1500 };
            leftStick.style.left = '40px'; 
            leftStick.style.top = '80px';  
            rightStick.style.left = '40px'; 
            rightStick.style.top = '40px'; 
            updateUI();
        }

        function updateUI() {
            document.getElementById('valT').textContent = Math.round((channels.throttle - 1000) / 10);
            document.getElementById('valY').textContent = channels.yaw; 
            document.getElementById('valP').textContent = channels.pitch; 
            document.getElementById('valR').textContent = channels.roll;
        }

        function startTransmissionLoop() {
            transmissionIntervalId = setInterval(async () => {
                if (!isConnected || !writer) return; 
                const tByte = Math.min(250, Math.max(0, Math.round((channels.throttle - 1000) / 4)));
                const yByte = Math.min(250, Math.max(0, Math.round((channels.yaw - 1000) / 4)));
                const pByte = Math.min(250, Math.max(0, Math.round((channels.pitch - 1000) / 4)));
                const rByte = Math.min(250, Math.max(0, Math.round((channels.roll - 1000) / 4)));
                const statusByte = isArmed ? 0x80 : 0x00;
                const checksum = (0xFE ^ tByte ^ yByte ^ pByte ^ rByte ^ statusByte) & 0xFF;
                const buffer = new Uint8Array([0xFE, tByte, yByte, pByte, rByte, statusByte, checksum]);
                try { 
                    await writer.write(buffer); 
                } catch (e) { console.error("數據鏈路中斷:", e); }
            }, 50); 
        }
    </script>
</body>
</html>
