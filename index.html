<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小四軸 - 藍牙虛擬遙控器</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        .btn-connect { background-color: #00adb5; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-connect.connected { background-color: #ff2e63; }
        .telemetry { display: flex; justify-content: space-around; background: #181818; padding: 10px 0; font-size: 13px; border-bottom: 1px solid #222; }
        .data-box span { color: #00adb5; font-weight: bold; }
        .control-container { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 20px; position: relative; }
        .joystick-zone { width: 160px; height: 160px; background: radial-gradient(circle, #252525 0%, #1a1a1a 100%); border: 2px solid #444; border-radius: 50%; position: relative; touch-action: none; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .stick { width: 55px; height: 55px; background: linear-gradient(145deg, #333333, #222222); border: 2px solid #00adb5; border-radius: 50%; position: absolute; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.4); transition: transform 0.05s linear; }
        .joystick-label { position: absolute; bottom: -25px; font-size: 12px; color: #888; text-align: center; width: 100%; }
        footer { padding: 15px; background: #1e1e1e; display: flex; justify-content: center; border-top: 1px solid #333; }
        .btn-arm { width: 80%; max-width: 300px; background-color: #333; color: #888; border: 2px solid #444; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-align: center; }
        .btn-arm.ready { background-color: #ff5722; color: white; border-color: #ff5722; box-shadow: 0 0 10px rgba(255,87,34,0.5); }
        #orientation-warning { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #121212; z-index: 9999; justify-content: center; align-items: center; }
        @media (orientation: portrait) { #orientation-warning { display: flex; } }
    </style>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW註冊失敗：', err));
        });
      }
    </script>
</head>
<body>
    <header>
        <div class="logo">小四軸</div>
        <button id="connectBtn" class="btn-connect">連接藍牙</button>
    </header>

    <section class="telemetry">
        <div class="data-box">油門(T): <span id="valT">0</span>%</div>
        <div class="data-box">航向(Y): <span id="valY">0</span></div>
        <div class="data-box">前後(P): <span id="valP">0</span></div>
        <div class="data-box">左右(R): <span id="valR">0</span></div>
    </section>

    <main class="control-container">
        <div id="leftZone" class="joystick-zone">
            <div id="leftStick" class="stick"></div>
            <div class="joystick-label">左手：油門 / 航向</div>
        </div>
        <div id="rightZone" class="joystick-zone">
            <div id="rightStick" class="stick"></div>
            <div class="joystick-label">右手：前後 / 左右</div>
        </div>
    </main>

    <footer>
        <button id="armBtn" class="btn-arm" disabled>請先連接藍牙</button>
    </footer>

    <div id="orientation-warning">
        <div style="text-align: center; padding: 20px;">
            <span style="font-size: 50px;">🔄</span>
            <h2 style="margin-top: 15px; font-size: 18px;">請將手機旋轉至【橫螢幕模式】</h2>
            <p style="color: #888; font-size: 13px; margin-top: 5px;">為了精準盲操戰機，請解鎖手機自動旋轉並打橫使用</p>
        </div>
    </div>

<script>
        let bluetoothDevice = null; let txCharacteristic = null; let isConnected = false; let isArmed = false; let transmissionIntervalId = null;
        let channels = { throttle: 1000, yaw: 1500, pitch: 1500, roll: 1500 };

        const connectBtn = document.getElementById('connectBtn'); const armBtn = document.getElementById('armBtn');
        const leftStick = document.getElementById('leftStick'); const rightStick = document.getElementById('rightStick');
        
        // 🛠️ 【通訊拓撲重構】擴大 UUID 的相容性邊界，允許通用串口透傳
        const UUID_SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const UUID_CHARACTERISTIC = "0000ffe1-0000-1000-8000-00805f9b34fb";

        connectBtn.addEventListener('click', async () => {
            if (isConnected) { disconnectBluetooth(); return; }
            try {
                // 🛠️ 【程式修正】改用動態過濾器，強制瀏覽器跳出原生搜尋視窗
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [
                        { services: [UUID_SERVICE] },
                        { namePrefix: 'HC' },
                        { namePrefix: 'Zen' }
                    ],
                    optionalServices: [UUID_SERVICE]
                });
                
                console.log("硬體握手成功，正在建立 GATT 隧道...");
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(UUID_SERVICE);
                txCharacteristic = await service.getCharacteristic(UUID_CHARACTERISTIC); 
                
                isConnected = true; connectBtn.textContent = "斷開連接"; connectBtn.classList.add('connected');
                armBtn.disabled = false; armBtn.textContent = "解鎖馬達 (ARM)"; armBtn.classList.add('ready');
                startTransmissionLoop();
            } catch (error) { 
                // 🛠️ 【錯誤 Usability 優化】讓程式自己把底層的真實錯誤代碼吐在主畫面上，不瞎猜！
                console.error(error);
                alert("瀏覽器核心回報錯誤: " + error.message + "\n\n請確認手機藍牙已開啟、未被其他 App 佔用，且使用 Google Chrome 瀏覽器！"); 
            }
        });

        function disconnectBluetooth() {
            if (transmissionIntervalId) { clearInterval(transmissionIntervalId); transmissionIntervalId = null; }
            if (bluetoothDevice && bluetoothDevice.gatt.connected) { bluetoothDevice.gatt.disconnect(); }
            isConnected = false; isArmed = false; connectBtn.textContent = "連接藍牙"; connectBtn.classList.remove('connected');
            armBtn.disabled = true; armBtn.classList.remove('ready'); armBtn.style.backgroundColor = "#333"; armBtn.textContent = "請先連接藍牙";
            resetSticks();
        }

        armBtn.addEventListener('click', () => {
            if (!isConnected) return;
            isArmed = !isArmed;
            if (isArmed) { armBtn.textContent = "❗ 鎖定馬達 (DISARM)"; armBtn.style.backgroundColor = "#ff2e63"; }
            else { armBtn.textContent = "解鎖馬達 (ARM)"; armBtn.style.backgroundColor = "#ff5722"; resetSticks(); }
        });

        function setupJoystick(zoneId, stickId, isLeftZone) {
            const zone = document.getElementById(zoneId); const stick = document.getElementById(stickId); const maxRadius = 52;
            const centerX = 52; const centerY = isLeftZone ? 104 : 52;
            stick.style.left = centerX + 'px'; stick.style.top = centerY + 'px';

            function handleMove(e) {
                e.preventDefault(); if (!isConnected) return;
                const touch = e.touches[0]; const rect = zone.getBoundingClientRect();
                let deltaX = touch.clientX - rect.left - 80; let deltaY = touch.clientY - rect.top - 80;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; }
                
                if (isLeftZone) { stick.style.left = (52 + deltaX) + 'px'; stick.style.top = (52 + deltaY) + 'px'; }
                else { stick.style.left = (centerX + deltaX) + 'px'; stick.style.top = (centerY + deltaY) + 'px'; }
                
                if (isLeftZone) {
                    channels.yaw = Math.round(1500 + (deltaX / maxRadius) * 500);
                    channels.throttle = Math.round(1500 - (deltaY / maxRadius) * 500);
                    channels.throttle = Math.max(1000, Math.min(2000, channels.throttle));
                } else {
                    channels.roll = Math.round(1500 + (deltaX / maxRadius) * 500);
                    channels.pitch = Math.round(1500 - (deltaY / maxRadius) * 500); 
                }
                updateUI();
            }

            function handleEnd() {
                if (isLeftZone) { channels.yaw = 1500; stick.style.left = centerX + 'px'; }
                else { channels.pitch = 1500; channels.roll = 1500; stick.style.left = centerX + 'px'; stick.style.top = centerY + 'px'; }
                updateUI();
            }
            zone.addEventListener('touchstart', handleMove); zone.addEventListener('touchmove', handleMove); zone.addEventListener('touchend', handleEnd);
        }

        setupJoystick('leftZone', 'leftStick', true); setupJoystick('rightZone', 'rightStick', false);

        function resetSticks() {
            channels = { throttle: 1000, yaw: 1500, pitch: 1500, roll: 1500 };
            leftStick.style.left = '52px'; leftStick.style.top = '104px'; rightStick.style.left = '52px'; rightStick.style.top = '52px';
            updateUI();
        }

        function updateUI() {
            document.getElementById('valT').textContent = Math.round((channels.throttle - 1000) / 10);
            document.getElementById('valY').textContent = channels.yaw; document.getElementById('valP').textContent = channels.pitch; document.getElementById('valR').textContent = channels.roll;
        }

        function startTransmissionLoop() {
            transmissionIntervalId = setInterval(async () => {
                if (!isConnected || !txCharacteristic) return;
                const tByte = Math.min(250, Math.max(0, Math.round((channels.throttle - 1000) / 4)));
                const yByte = Math.min(250, Math.max(0, Math.round((channels.yaw - 1000) / 4)));
                const pByte = Math.min(250, Math.max(0, Math.round((channels.pitch - 1000) / 4)));
                const rByte = Math.min(250, Math.max(0, Math.round((channels.roll - 1000) / 4)));
                const statusByte = isArmed ? 0x80 : 0x00;
                const checksum = (0xFE ^ tByte ^ yByte ^ pByte ^ rByte ^ statusByte) & 0xFF;
                const buffer = new Uint8Array([0xFE, tByte, yByte, pByte, rByte, statusByte, checksum]);
                try { 
                    // 🛠️ 【相容性回退機制】先嘗試標準發射，若受阻自動切換為雙向安全應答模式
                    await txCharacteristic.writeValueWithoutResponse(buffer).catch(async () => {
                        await txCharacteristic.writeValue(buffer);
                    }); 
                } catch (e) { console.error("數據鏈路中斷:", e); }
            }, 50); 
        }
    </script>
</body>
</html>
